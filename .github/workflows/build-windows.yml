name: Build Windows

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set version from tag
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          Write-Host "Building version $version"
          Set-Content -Path version.py -Value "__version__ = `"$version`""

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt --no-compile
          python -m pip install pyinstaller

      - name: Build with PyInstaller
        shell: pwsh
        run: pyinstaller packaging/pdf2sepa.spec

      - name: Verify build output
        shell: pwsh
        run: |
          $exe = "packaging/dist/PDF2SEPA/PDF2SEPA.exe"
          $internal = "packaging/dist/PDF2SEPA/_internal"
          if (-not (Test-Path $exe)) {
            Write-Error "Missing $exe"
            exit 1
          }
          if (-not (Test-Path $internal)) {
            Write-Error "Missing $internal"
            exit 1
          }
          Write-Host "Build output verified: PDF2SEPA.exe and _internal/ present"

      - name: Create zip archive
        shell: pwsh
        run: |
          Compress-Archive -Path packaging\dist\PDF2SEPA\* -DestinationPath PDF2SEPA.zip -Force
          Write-Host "Created PDF2SEPA.zip ($((Get-Item PDF2SEPA.zip).Length) bytes)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDF2SEPA-Windows-build
          path: PDF2SEPA.zip
