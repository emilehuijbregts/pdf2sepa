name: Build Windows

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set version from tag
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          Write-Host "Building version $version"
          Set-Content -Path version.py -Value "__version__ = `"$version`""

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt --no-compile
          python -m pip install pyinstaller

      - name: Stage Tesseract for bundling
        shell: pwsh
        run: |
          choco install tesseract -y --no-progress
          $src = "C:\Program Files\Tesseract-OCR"
          $dst = "packaging\tesseract"
          $tessdataRepo = "https://github.com/tesseract-ocr/tessdata/raw/main"
          New-Item -ItemType Directory -Force -Path $dst | Out-Null
          Copy-Item "$src\tesseract.exe" $dst -Force
          Copy-Item "$src\*.dll" $dst -Force
          New-Item -ItemType Directory -Force -Path "$dst\tessdata" | Out-Null
          foreach ($lang in @("eng", "nld")) {
            $dest = "$dst\tessdata\$lang.traineddata"
            $trained = "$src\tessdata\$lang.traineddata"
            if (Test-Path $trained) {
              Copy-Item $trained $dest -Force
            } elseif (-not (Test-Path $dest)) {
              $url = "$tessdataRepo/$lang.traineddata"
              Write-Host "Downloading tessdata: $url"
              Invoke-WebRequest -Uri $url -OutFile $dest -UseBasicParsing
            }
            if (-not (Test-Path $dest)) {
              Write-Error "Missing required tessdata language pack: $lang"
              exit 1
            }
          }
          if (-not (Test-Path "$dst\tesseract.exe")) {
            Write-Error "Tesseract staging failed"
            exit 1
          }
          Write-Host "Staged Tesseract to $dst (eng + nld tessdata)"

      - name: Build with PyInstaller
        shell: pwsh
        run: pyinstaller --distpath packaging/dist --workpath packaging/build packaging/pdf2sepa.spec

      - name: Build updater
        shell: pwsh
        run: pyinstaller --distpath packaging/dist --workpath packaging/build packaging/pdf2sepa_updater.spec

      - name: Verify build output
        shell: pwsh
        run: |
          $exe = "packaging/dist/PDF2SEPA/PDF2SEPA.exe"
          $internal = "packaging/dist/PDF2SEPA/_internal"
          $bundle = "$internal/data/strategy_engine_bundle.json"
          $tesseract = "$internal/tesseract/tesseract.exe"
          if (-not (Test-Path $exe)) {
            Write-Error "Missing $exe"
            exit 1
          }
          if (-not (Test-Path $internal)) {
            Write-Error "Missing $internal"
            exit 1
          }
          if (-not (Test-Path $bundle)) {
            Write-Error "Missing parser bundle: $bundle"
            exit 1
          }
          if (-not (Test-Path $tesseract)) {
            Write-Error "Missing bundled Tesseract: $tesseract"
            exit 1
          }
          $nld = "$internal/tesseract/tessdata/nld.traineddata"
          if (-not (Test-Path $nld)) {
            Write-Error "Missing Dutch OCR model: $nld"
            exit 1
          }
          $updater = "packaging/dist/PDF2SEPAUpdater/PDF2SEPAUpdater.exe"
          if (-not (Test-Path $updater)) {
            Write-Error "Missing updater executable: $updater"
            exit 1
          }
          if (Test-Path "packaging/dist/PDF2SEPA/PDF2SEPAUpdater.exe") {
            Write-Error "Updater must not be bundled inside app/ (breaks in-place updates)"
            exit 1
          }
          if (Test-Path "packaging/dist/PDF2SEPA/updater") {
            Write-Error "Updater must not be bundled inside app/ (breaks in-place updates)"
            exit 1
          }
          Write-Host "Build output verified: exe, updater, bundle, Tesseract and nld tessdata present"

      - name: Create zip archive
        shell: pwsh
        run: |
          $stage = "update_payload"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          New-Item -ItemType Directory -Force -Path "$stage/updater" | Out-Null
          Copy-Item packaging\dist\PDF2SEPA\* "$stage" -Recurse -Force
          Copy-Item packaging\dist\PDF2SEPAUpdater\* "$stage/updater" -Recurse -Force
          Compress-Archive -Path "$stage/*" -DestinationPath PDF2SEPA.zip -Force
          Remove-Item -Recurse -Force $stage
          Write-Host "Created PDF2SEPA.zip ($((Get-Item PDF2SEPA.zip).Length) bytes)"

      - name: Generate latest.json
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $hash = (Get-FileHash PDF2SEPA.zip -Algorithm SHA256).Hash.ToLower()
          $url = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/PDF2SEPA.zip"
          $json = (@{
            version = $version
            url = $url
            sha256 = $hash
          } | ConvertTo-Json)
          [System.IO.File]::WriteAllText("$PWD\latest.json", $json, [System.Text.UTF8Encoding]::new($false))
          Get-Content latest.json

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" packaging\installer.iss /DMyAppVersion=$version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDF2SEPA-Windows-build
          path: |
            PDF2SEPA.zip
            latest.json
            packaging/output/PDF2SEPA-Setup-*.exe

      - name: Publish GitHub Release
        if: ${{ !contains(github.ref_name, '-test') }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            PDF2SEPA.zip
            latest.json
            packaging/output/PDF2SEPA-Setup-*.exe
